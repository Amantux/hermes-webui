services:
  hermes-webui:
    build: .
    user: root
    # Bridge networking for explicit port mapping
    ports:
      - "9220:8787"
    volumes:
      - /root/.hermes:/home/hermeswebui/.hermes
      - /root/workspace:/workspace
      - /usr/local/lib/hermes-agent:/home/hermeswebui/hermes-agent
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - HERMES_WEBUI_PASSWORD=${HERMES_WEBUI_PASSWORD}
      - HERMES_WEBUI_AGENT_DIR=/home/hermeswebui/hermes-agent
      - UV_IGNORE_VENV=1
    restart: unless-stopped
    # Bypass the init loop and run server directly
    command: python3 /apptoo/server.py
